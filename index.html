<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REGISTRO HORAS CLOUD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Librerías para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #0ea5e9;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        body.dark-mode {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary: #3b82f6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        body { 
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            background: var(--bg-body); 
            color: var(--text-main); 
            transition: background-color 0.3s ease, color 0.3s ease;
            font-size: 15px;
        }

        .container { padding: 16px 12px; max-width: 600px; margin: 0 auto; }

        /* PANTALLA DE LOGIN */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .login-card {
            background: var(--bg-card);
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 350px;
            border: 1px solid var(--border-color);
        }
        .btn-google {
            background: white;
            color: #333;
            border: 1px solid #ccc;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .btn-guest {
            background: var(--bg-body);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        /* HEADER APP */
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 4px; }
        h1 { margin: 0; font-size: 1.25rem; font-weight: 800; color: var(--text-main); }
        .user-badge { font-size: 12px; color: var(--text-muted); display: block; margin-top: 4px; }
        
        .header-btns { display: flex; gap: 8px; }
        .btn-icon { 
            background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color);
            padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 20px;
        }

        /* CARDS & FORMS (Igual que antes) */
        .top-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .card { background: var(--bg-card); padding: 20px; border-radius: var(--radius); margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border-color); }
        .top-cards .card { margin-bottom: 0; padding: 16px; text-align: center; border-top-width: 4px; }
        .card-extra { grid-column: 1 / -1; border-top-color: var(--success); }
        .negative { border-top-color: var(--danger); }
        .exceso { border-top-color: var(--warning); }
        .card h3 { margin: 0 0 4px 0; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        .card-extra h2 { font-size: 2.2rem; margin: 0; color: var(--success); font-weight: 800; }
        .card h2 { font-size: 1.6rem; margin: 0; font-weight: 800; }
        
        .form-group { text-align: left; margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
        input, select { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 15px; background: var(--bg-body); color: var(--text-main); }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        
        button.btn-primary { background: var(--primary); color: white; border: none; font-weight: 700; margin-top: 8px; border-radius: 8px; padding: 12px 16px; width: 100%; cursor: pointer; }

        .item { border-bottom: 1px solid var(--border-color); padding: 16px 0; display: flex; justify-content: space-between; align-items: center; }
        .tipo { font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 12px; display: inline-block; margin-bottom: 6px; }
        .verde { color: #047857; background: #d1fae5; }
        .rojo { color: #be123c; background: #ffe4e6; }
        .amarillo { color: #b45309; background: #fef3c7; }
        .dark-mode .verde { color: #34d399; background: rgba(16, 185, 129, 0.15); }
        .dark-mode .rojo { color: #fb7185; background: rgba(225, 29, 72, 0.15); }
        .dark-mode .amarillo { color: #fbbf24; background: rgba(245, 158, 11, 0.15); }
        
        .borrar-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 8px 14px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer;}
        
        .mes-titulo { background: var(--bg-body); color: var(--text-muted); padding: 8px 12px; border-radius: 6px; margin-top: 24px; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; border: 1px solid var(--border-color); text-transform: uppercase; }

        #mensaje { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text-main); color: var(--bg-card); padding: 10px 24px; border-radius: 30px; display: none; z-index: 9999; font-weight: 600; }

        /* Modales */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-card); padding: 24px; border-radius: 16px; text-align: center; max-width: 340px; width: 90%; border: 1px solid var(--border-color); }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;}
        #modalBtnCancel { background: var(--bg-body); color: var(--text-main); border: 1px solid var(--border-color); }
        #modalBtnOk { background: var(--danger); color: white; }
    </style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <h2 style="margin-top:0">Control de Horas</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">Inicia sesión para guardar tus registros en la nube.</p>
        
        <button class="btn-google" onclick="loginGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Entrar con Google
        </button>
        
        <button class="btn-google btn-guest" onclick="loginAnonimo()">
            Entrar como Invitado
        </button>
    </div>
</div>

<!-- APLICACIÓN PRINCIPAL -->
<div id="app-container" class="container" style="display: none;">
    <div class="header-container">
        <div>
            <h1>REGISTRO HORAS</h1>
            <span id="user-name-display" class="user-badge">Cargando usuario...</span>
        </div>
        <div class="header-btns">
            <button class="btn-icon" onclick="toggleModo()">🌓</button>
            <button class="btn-icon" onclick="logout()" style="color: var(--danger); border-color: rgba(239, 68, 68, 0.3);">Salir</button>
        </div>
    </div>

    <div class="top-cards">
        <div class="card card-extra">
            <h3>Extra Acumuladas</h3>
            <h2 id="totalExtra">0.00</h2>
        </div>
        <div class="card negative">
            <h3>Negativas</h3>
            <h2 id="totalNeg">0.00</h2>
        </div>
        <div class="card exceso">
            <h3>Exceso</h3>
            <h2 id="totalExceso">0.00</h2>
        </div>
    </div>

    <div class="card">
        <h3 style="color: var(--text-main); margin-bottom: 16px; font-size: 1.1rem; text-transform: none;">Nuevo Registro</h3>
        
        <div class="form-group">
            <label>Tipo de hora</label>
            <select id="tipo">
                <option value="extra">➕ Extra (x1.75)</option>
                <option value="negativa">➖ Negativa (x1.0)</option>
                <option value="festiva">🎉 Festiva (x2.25)</option>
                <option value="nocturna">🌙 Nocturna (x2.0)</option>
                <option value="exceso">⚠️ Exceso (x1.0)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Horas</label>
            <input type="number" id="horas" placeholder="Ej: 2.5" step="0.01">
        </div>
        <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="fecha">
        </div>
        <div class="form-group">
            <label>Observaciones</label>
            <input type="text" id="desc" placeholder="Nota rápida...">
        </div>
        <button class="btn-primary" onclick="guardar()">GUARDAR EN LA NUBE</button>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 style="margin:0; font-size: 1.1rem; color: var(--text-main); text-transform:none;">Historial Sincronizado</h3>
            <button class="btn-icon" style="background: var(--success); color: white; border: none;" onclick="exportarPDF()">📄 PDF</button>
        </div>
        <input type="text" id="buscador" placeholder="Buscar por nota o fecha..." oninput="filtrarLocal()">
        <div id="lista-cargando" style="text-align:center; padding: 20px; color: var(--text-muted);">Sincronizando datos...</div>
        <div id="lista"></div>
    </div>
</div>

<div id="mensaje">✅</div>

<!-- Modal de Confirmación -->
<div id="customModal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top:0; margin-bottom:15px; font-size: 1.1rem;">Confirmación</h3>
        <p id="modalText" style="font-size: 15px; color: var(--text-muted); margin-bottom: 20px;"></p>
        <div class="modal-buttons">
            <button id="modalBtnCancel">Cancelar</button>
            <button id="modalBtnOk">Confirmar</button>
        </div>
    </div>
</div>

<!-- FIREBASE Y LÓGICA DE LA APP (Como un Módulo) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 🔴🔴🔴 PASO 3: PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE 🔴🔴🔴
    // Borra esto y pega lo que te da Firebase en el Paso 1
    let firebaseConfig = {
        apiKey: "AIzaSyA1ZDWVjptthMonjh3izMHo12zSCatIijo",
        authDomain: "registro-horas-fd560.firebaseapp.com",
        projectId: "registro-horas-fd560",
        storageBucket: "registro-horas-fd560.firebasestorage.app",
        messagingSenderId: "826522376259",
        appId: "1:826522376259:web:d137f77934da0adc011cf6",
        measurementId: "G-SD817XEWSH"
    };

    // (Código interno para que funcione en esta vista previa, no lo borres)
    if (typeof __firebase_config !== 'undefined') { firebaseConfig = JSON.parse(__firebase_config); }
    const appIdStr = typeof __app_id !== 'undefined' ? __app_id : 'horas-md-vercel';

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let unsubscribeData = null;
    let registrosLocales = []; // Guarda los datos en memoria para filtrar

    // --- AUTENTICACIÓN ---
    
    // Función para auto-login en la vista previa de esta pantalla
    const initAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            try { await signInWithCustomToken(auth, __initial_auth_token); } catch(e){}
        }
    };
    initAuth();

    window.loginGoogle = async () => {
        try {
            const provider = new GoogleAuthProvider();
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error(error);
            showModal("Error al conectar con Google. (Si estás en la vista previa, usa el modo Invitado).");
        }
    };

    window.loginAnonimo = async () => {
        try { await signInAnonymously(auth); } 
        catch (error) { showModal("Error al entrar como invitado."); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            
            const nombre = user.isAnonymous ? "Invitado (Temporal)" : (user.displayName || user.email);
            document.getElementById('user-name-display').innerText = `👋 Hola, ${nombre}`;
            
            cargarDatosNube();
        } else {
            currentUser = null;
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
            if (unsubscribeData) { unsubscribeData(); unsubscribeData = null; }
        }
    });

    // --- BASE DE DATOS (FIRESTORE) ---

    function cargarDatosNube() {
        if (!currentUser) return;
        
        // Referencia a la colección privada de este usuario
        const ref = collection(db, 'artifacts', appIdStr, 'users', currentUser.uid, 'registros');
        
        document.getElementById("lista-cargando").style.display = "block";
        document.getElementById("lista").innerHTML = "";

        // onSnapshot escucha cambios en tiempo real
        unsubscribeData = onSnapshot(ref, (snapshot) => {
            registrosLocales = [];
            snapshot.forEach(docSnap => {
                registrosLocales.push({ ...docSnap.data(), id: docSnap.id });
            });
            // Ordenar por fecha (más reciente primero)
            registrosLocales.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            document.getElementById("lista-cargando").style.display = "none";
            renderizarUI();
        }, (error) => {
            console.error("Error al leer:", error);
            document.getElementById("lista-cargando").innerText = "Error de permisos al leer la nube.";
        });
    }

    window.guardar = async () => {
        const hIn = parseFloat(document.getElementById("horas").value);
        const desc = document.getElementById("desc").value || "-";
        const fecha = document.getElementById("fecha").value;
        const tipoInput = document.getElementById("tipo").value;

        if (isNaN(hIn) || hIn === 0) { showModal("Indica una cantidad de horas válida."); return; }
        if (!fecha) { showModal("La fecha es necesaria."); return; }
        if (!currentUser) { showModal("Debes iniciar sesión."); return; }

        let factor = 1.0;
        if (hIn > 0) {
            if (tipoInput === "extra") factor = 1.75;
            else if (tipoInput === "festiva") factor = 2.25;
            else if (tipoInput === "nocturna") factor = 2.0;
        }

        const nuevoRegistro = {
            horasCalculadas: hIn * factor,
            horasOriginales: hIn,
            desc: desc,
            fecha: fecha,
            tipoOriginal: tipoInput,
            timestamp: Date.now()
        };

        try {
            const ref = collection(db, 'artifacts', appIdStr, 'users', currentUser.uid, 'registros');
            await addDoc(ref, nuevoRegistro); // Guardar en la nube
            
            document.getElementById("horas").value = "";
            document.getElementById("desc").value = "";
            showToast("Guardado en la nube");
        } catch (error) {
            console.error(error);
            showModal("Error al guardar en la nube.");
        }
    };

    window.borrarRegistro = (docId) => {
        showModal("¿Borrar este registro de la nube?", true, async () => {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appIdStr, 'users', currentUser.uid, 'registros', docId);
                await deleteDoc(docRef); // Borrar de la nube
                showToast("Registro eliminado");
            } catch (error) {
                showModal("Error al borrar.");
            }
        });
    };

    // --- INTERFAZ DE USUARIO ---

    window.filtrarLocal = () => { renderizarUI(); };

    function renderizarUI() {
        const cont = document.getElementById("lista");
        cont.innerHTML = "";
        let tExtra = 0, tNeg = 0, tExc = 0;
        
        const filter = document.getElementById("buscador").value.toLowerCase();
        const meses = {};

        registrosLocales.forEach(item => {
            const f = new Date(item.fecha);
            const fFmt = `${String(f.getDate()).padStart(2,'0')}/${String(f.getMonth()+1).padStart(2,'0')}/${f.getFullYear()}`;
            
            if (filter && !item.desc.toLowerCase().includes(filter) && !fFmt.includes(filter)) return;

            if (item.tipoOriginal === "negativa") tNeg += item.horasCalculadas; 
            else if (item.tipoOriginal === "exceso") tExc += item.horasCalculadas;
            else tExtra += item.horasCalculadas;

            const mKey = `${f.getFullYear()}-${String(f.getMonth()+1).padStart(2,'0')}`;
            if (!meses[mKey]) meses[mKey] = { label: f.toLocaleString('es-ES', { month: 'long', year: 'numeric' }), items: [] };
            meses[mKey].items.push({ ...item, fFmt });
        });

        if(Object.keys(meses).length === 0 && registrosLocales.length > 0) {
            cont.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--text-muted);">No hay coincidencias.</div>`;
        } else if (registrosLocales.length === 0) {
            cont.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--text-muted);">Aún no tienes registros en la nube.</div>`;
        }

        Object.keys(meses).sort((a,b) => b.localeCompare(a)).forEach(k => {
            const m = meses[k];
            cont.innerHTML += `<div class="mes-titulo">${m.label}</div>`;
            m.items.forEach(i => {
                const colors = { extra: 'verde', festiva: 'verde', nocturna: 'verde', negativa: 'rojo', exceso: 'amarillo' };
                cont.innerHTML += `
                    <div class="item">
                        <div style="flex: 1;">
                            <span class="tipo ${colors[i.tipoOriginal]}">${i.tipoOriginal.toUpperCase()}</span><br>
                            <b style="font-size: 15px;">${i.horasOriginales}h</b> <small style="color: var(--text-muted);">(${i.horasCalculadas.toFixed(2)}h)</small><br>
                            <small style="font-size: 13px; color: var(--text-muted); display:block; margin-top:4px">${i.fFmt} • ${i.desc}</small>
                        </div>
                        <button class="borrar-btn" onclick="borrarRegistro('${i.id}')">Borrar</button>
                    </div>`;
            });
        });

        document.getElementById("totalExtra").innerText = tExtra.toFixed(2);
        document.getElementById("totalNeg").innerText = tNeg.toFixed(2);
        document.getElementById("totalExceso").innerText = tExc.toFixed(2);
    }

    // Funciones de UI generales (Modo Oscuro, Toast, PDF...)
    window.toggleModo = () => {
        document.body.classList.toggle("dark-mode");
        localStorage.setItem("modo", document.body.classList.contains("dark-mode") ? "dark" : "light");
    };
    if (localStorage.getItem("modo") === "dark") document.body.classList.add("dark-mode");

    function showToast(t) {
        const m = document.getElementById("mensaje");
        m.style.display = "block"; m.innerText = t + " ✅"; 
        setTimeout(() => m.style.display = "none", 2500);
    }

    let mCb = null;
    window.showModal = (msg, conf = false, cb = null) => {
        document.getElementById("modalText").innerText = msg;
        document.getElementById("customModal").style.display = "flex";
        document.getElementById("modalBtnCancel").style.display = conf ? "block" : "none";
        document.getElementById("modalBtnOk").innerText = conf ? "Confirmar" : "Entendido";
        document.getElementById("modalBtnOk").style.background = conf ? "var(--danger)" : "var(--primary)";
        mCb = cb;
    };
    
    document.getElementById("modalBtnOk").onclick = () => {
        document.getElementById("customModal").style.display = "none";
        if (mCb) mCb();
    };
    document.getElementById("modalBtnCancel").onclick = () => {
        document.getElementById("customModal").style.display = "none";
    };

    window.exportarPDF = () => {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFontSize(16); doc.text("REGISTRO HORAS CLOUD", 14, 20);
        
        const tableData = registrosLocales.map(i => [
            i.fecha.split('-').reverse().join('/'), 
            i.tipoOriginal.toUpperCase(), 
            i.horasOriginales.toFixed(2), 
            i.horasCalculadas.toFixed(2), 
            i.desc
        ]);

        doc.autoTable({ startY: 30, head: [['Fecha', 'Tipo', 'Horas Base', 'Horas Calc.', 'Observaciones']], body: tableData });
        doc.save(`Horas_MD_${new Date().toLocaleDateString()}.pdf`);
    };

    document.getElementById('fecha').valueAsDate = new Date();
</script>
</body>
</html>
