<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE CONTROL OPERATIVO - EL PATRÓN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.5);
            --bg-dark: #050a14;
            --card-bg: rgba(10, 20, 35, 0.95);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --accent-green: #22c55e;
            --accent-purple: #a855f7;
            --accent-orange: #f97316;
            --accent-teams: #464eb8;
            --glass-border: rgba(0, 242, 255, 0.3);
            --grid-color: rgba(0, 242, 255, 0.05);
            /* Tipografías */
            --font-title: 'Syncopate', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-body);
            background: 
                linear-gradient(rgba(5, 10, 20, 0.8), rgba(5, 10, 20, 0.9)),
                url("https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            font-size: 20px;
        }

        /* Efecto HUD Grid */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 1;
        }

        /* --- Header --- */
        header {
            background: rgba(2, 6, 12, 0.98);
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            border-bottom: 4px solid var(--primary);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 1.8rem;
            font-family: var(--font-title);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
        }

        /* --- Layout --- */
        .main-content {
            flex: 1;
            padding: 3rem 2rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            z-index: 2;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 2.5rem;
        }

        /* --- Cards --- */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            padding: 2.5rem;
            border: 2px solid var(--glass-border);
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        .card h2 {
            margin: 0 0 2rem 0;
            font-family: var(--font-title);
            font-size: 1.2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* --- Botones --- */
        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.4rem 1.6rem;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            font-family: var(--font-body);
        }

        button:hover {
            background: rgba(0, 242, 255, 0.2);
            color: var(--primary);
            border-color: var(--primary);
        }

        .btn-green { border-right: 6px solid var(--accent-green); }
        .btn-purple { border-right: 6px solid var(--accent-purple); }
        .btn-orange { border-right: 6px solid var(--accent-orange); }
        .btn-teams { border-right: 6px solid var(--accent-teams); color: #cbd5e1; }
        .btn-teams:hover { color: white; background: rgba(70, 78, 184, 0.3); border-color: #6069d1; }
        
        .btn-primary-solid {
            background: var(--primary);
            color: #000;
            border: none;
            justify-content: center;
        }

        /* --- SOLUCIÓN DESPLEGABLE: Z-INDEX GLOBAL --- */
        .dropdown {
            position: relative;
            width: 100%;
        }

        .dropdown-content {
            display: none;
            background: #08101d;
            border: 3px solid var(--primary);
            position: absolute;
            width: 100%;
            top: 100%;
            left: 0;
            z-index: 9999; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            margin-top: 5px;
        }

        .dropdown-content a {
            display: block;
            padding: 1.4rem;
            color: var(--text);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 800;
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            transition: background 0.2s;
        }

        .dropdown-content a:hover {
            background: var(--primary);
            color: #000;
        }

        /* --- Footer / Time --- */
        .time-display {
            text-align: right;
            font-family: var(--font-mono);
        }

        #clock {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }

        /* Notificaciones HUD */
        #toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: #000;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 15px 30px;
            font-family: var(--font-mono);
            z-index: 10000;
            transform: translateX(200%);
            transition: 0.4s ease;
        }
        #toast.show { transform: translateX(0); }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            header { padding: 1rem; }
            .logo-area h1 { font-size: 1.4rem; }
        }
    </style>
</head>

<body>

        </div>
        <div class="time-display">

    </header>

    <div class="main-content">
        <div class="container">

            <div class="card">

                    <button onclick="abrirLinks()">Recordatorios Niponas ➡</button>
                </div>
            </div>

            <!-- PLANIFICACIÓN -->
            <div class="card" style="z-index: 1000;">
                <h2>📅 PLANIFICACIÓN</h2>
                <div class="button-grid">
                    <button onclick="abrirLinks2()">Turnos / Vacaciones 📅</button>

                            <a href="#" onclick="abrirLinks5_4()">PACO</a>
                            <a href="#" onclick="abrirLinks5_5()">NATALIA</a>
                            <a href="#" onclick="abrirLinks5_6()">ENZO</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SOLICITUDES -->
            <div class="card">
                <h2>📝 SOLICITUDES</h2>
                <div class="button-grid">
                    <button class="btn-green" onclick="abrirComedor()">COMEDOR 🍽️</button>
                    <button class="btn-purple" onclick="abrirRRHH()">SOLICITUDES RRHH 📋</button>
                    <button class="btn-orange" onclick="abrirMySpace()">MI ESPACIO INET 🌐</button>
                </div>
            </div>

            <!-- AUWA -->
            <div class="card">
                <h2>🏭 SISTEMA AUWA</h2>
                <div class="button-grid">
                    <button onclick="abrirPRC()">TERMINALES PRC 🖥️</button>
                    <button onclick="abrirPAQ()">TERMINALES PAQ 📦</button>
                </div>
            </div>

        </div>
    </div>

    <div id="toast">> ACCESO_CONFIRMADO</div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('es-ES', { hour12: false });
            document.getElementById('date').textContent = now.toLocaleDateString('es-ES', { weekday: 'long', day: '2-digit', month: 'long' }).toUpperCase();
        }
        setInterval(updateTime, 1000);
        updateTime();

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = "> " + msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Función específica para abrir en VENTANA nueva (Pop-up)
        function abrirVentana(url, nombre) {
            const caracteristicas = "width=1200,height=800,menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=yes";
            const win = window.open(url, nombre, caracteristicas);
            if (win) showToast("VENTANA INICIADA: " + nombre);
            else showToast("POP-UP BLOQUEADO");
        }

        function abrir(url) {
            const win = window.open(url, '_blank');
            if (win) showToast("EJECUTANDO...");
            else showToast("BLOQUEADO POR NAVEGADOR");
        }

        function abrirTeams() {
            showToast("ABRIENDO TEAMS...");
            window.location.href = "msteams:/";
        }

        function toggleMenu() {
            const menu = document.getElementById("menu5");
            const isOpen = menu.style.display === "block";
            menu.style.display = isOpen ? "none" : "block";
        }

        window.onclick = function(e) {
            if (!e.target.closest('.dropdown')) {
                document.getElementById("menu5").style.display = "none";
            }
        }
    </script>
</body>
